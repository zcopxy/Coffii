name: Coffii
options:
  bundleIdPrefix: com.coffii
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "K58WP9644S"
    CODE_SIGNING_ALLOWED: YES
    CODE_SIGNING_REQUIRED: YES
    CODE_SIGN_IDENTITY: "Apple Development"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    ALWAYS_SEARCH_USER_PATHS: NO

targets:
  Coffii:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Coffii
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.coffii.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Coffii
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSCameraUsageDescription: "Coffii uses the camera to attach a photo of your shot to your log."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Coffii lets you pick a photo from your library to attach to a shot."
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "Save your Shot in Review card to your photo library."
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: Crema
